<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Vente Los Taques</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="icon" type="image/png" href="../img/logo.png">
</head>
<body class="pagina-alternativa">

        <!-- Pantalla de Carga Exclusiva para Contacto -->
    <div class="pantalla-carga" id="loader-bienvenida">
        <div class="pantalla-carga-contenido">
            <h2 id="loader-texto">Cargando...</h2>
            <img src="../img/logofondo.png" alt="Logo Icono">
        </div>
    </div>


    <header class="header-institucional">
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html">
                    <img src="../img/logofondo.png" alt="Vente Los Taques" class="logo-img">
                </a>
            </div>
            <button class="hamburger" aria-label="Abrir menú" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Inicio</a></li>
                <li><a href="../nosotros/" class="nav-link">Nosotros</a></li>
                <li><a href="../propuestas/" class="nav-link">Propuestas</a></li>
                <li><a href="../noticias/" class="nav-link">Noticias</a></li>
                <li><a href="../juventud/" class="nav-link">Vente Joven</a></li>
                <li><a href="../contacto/" class="nav-link">Contacto</a></li>
                <li><a href="../inscribete/" class="nav-link btn-cta-nav">Inscríbete</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor">
        <div class="encabezado-seccion">
            <h2>Atención Ciudadana en Los Taques</h2>
            <p>Envía tus ideas, propuestas o planteamientos directamente a nuestra coordinación municipal.</p>
        </div>

        <div class="contenedor-formulario">
            <form action="https://formspree.io/f/TU_ID_FORMSPREE" method="POST">
                <div class="grupo-form">
                    <label for="nombre-contacto">Nombre Completo</label>
                    <input type="text" id="nombre-contacto" name="nombre" required placeholder="Tu nombre">
                </div>
                <div class="grupo-form">
                    <label for="email-contacto">Correo Electrónico</label>
                    <input type="email" id="email-contacto" name="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="grupo-form">
                    <label for="mensaje-contacto">Mensaje o Sugerencia</label>
                    <textarea id="mensaje-contacto" name="mensaje" rows="6" required placeholder="Escribe aquí..."></textarea>
                </div>
                <button type="submit" class="btn-principal">Enviar Mensaje Formal</button>
            </form>
        </div>
    </main>

    <script src="../js/funciones.js"></script>
</body>
</html>
